# Luna2D Engine Message Catalog
#
# Format: ID = "human-readable message text"
# IDs are stable across versions — never reuse a retired ID.
#
# The catalog is organized by tier to reflect the engine module hierarchy.
# The loader flattens all nested tables into a single ID → text map, so IDs
# must be globally unique regardless of which section they appear in.
#
# Tiers:
#   baseline — engine + math (no external dependencies)
#   tier1    — core subsystems: graphics, audio, physics, input, timer, …
#   tier2    — engine extensions: ai, tilemap, scene, resource, …
#   tier3    — gameplay / library: dialog, inventory, quest, …

# =============================================================================
# BASELINE — engine module
# =============================================================================

