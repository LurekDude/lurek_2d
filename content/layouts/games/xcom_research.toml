# xcom_research.toml — XCOM research lab screen
# Viewport: 1280 × 720
# Contains: research queue, available projects list, scientists allocation,
#           selected project detail panel, estimated time, research log

[root]
widget_type = "panel"
id = "research_root"
x = 0.0
y = 0.0
w = 1280.0
h = 720.0

# ── Header bar ────────────────────────────────────────────────────────────────

[[root.children]]
widget_type = "panel"
id = "header_bar"
x = 0.0
y = 0.0
w = 1280.0
h = 48.0

[[root.children.children]]
widget_type = "label"
id = "screen_title"
x = 16.0
y = 16.0
w = 304.0
h = 24.0

[[root.children.children]]
widget_type = "label"
id = "free_scientists"
x = 504.0
y = 16.0
w = 304.0
h = 24.0
tooltip = "Scientists available for new projects"

[[root.children.children]]
widget_type = "button"
id = "back_btn"
x = 1200.0
y = 8.0
w = 72.0
h = 32.0
tooltip = "Return to base"

# ── Available projects list ───────────────────────────────────────────────────

[[root.children]]
widget_type = "panel"
id = "available_panel"
x = 0.0
y = 48.0
w = 360.0
h = 672.0

[[root.children.children]]
widget_type = "label"
id = "available_title"
