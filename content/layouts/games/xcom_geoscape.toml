# xcom_geoscape.toml — UFO: Enemy Unknown / XCOM world map screen
# Viewport: 1280 × 720
# Contains: world map panel, base markers (5 bases), radar range overlay,
#           detected UFO list, interceptor scramble panel, time controls,
#           funding/score bar, month/date display, alert log

[root]
widget_type = "panel"
id = "geoscape_root"
x = 0.0
y = 0.0
w = 1280.0
h = 720.0

# ── World map ─────────────────────────────────────────────────────────────────

[[root.children]]
widget_type = "panel"
id = "world_map"
x = 0.0
y = 0.0
w = 904.0
h = 680.0
tooltip = "Geoscape — world map"

# Base markers on map (illustrative positions)
[[root.children.children]]
widget_type = "badge"
id = "base_1_marker"
x = 224.0
y = 224.0
w = 32.0
h = 32.0
tooltip = "Base Alpha — North America"

