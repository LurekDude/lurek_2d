# fps_hud.toml — First-person shooter in-game HUD
# Viewport: 1280 × 720
# Contains: HP/armour bars, ammo counter, grenade count, ability cooldowns,
#           crosshair slot, compass bar, kill feed area, objective marker

[root]
widget_type = "panel"
id          = "fps_hud_root"
x = 0.0
y = 0.0
w = 1280.0
h = 720.0

