# roguelike_dungeon_hud.toml — Roguelike in-game HUD (Nethack/DCSS style)
# Viewport: 1280 × 720
# Contains: play field, sidebar (stats, equipment slots, status effects),
#           message log strip at bottom

[root]
widget_type = "panel"
id = "roguelike_root"
x = 0.0
y = 0.0
w = 1280.0
h = 720.0

