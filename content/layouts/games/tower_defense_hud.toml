# tower_defense_hud.toml — Tower-defence in-game HUD
# Viewport: 1280 × 720
# Contains: resource bar (gold/lives/wave), 4 tower-build buttons,
#           wave progress bar, speed toggle, start-wave and pause buttons

[root]
widget_type = "panel"
id          = "td_hud_root"
x = 0.0
y = 0.0
w = 1280.0
h = 720.0

# ── Top resource bar ──────────────────────────────────────────────────────────

[[root.children]]
widget_type = "panel"
id = "resource_bar"
x = 0.0
y = 0.0
w = 1280.0
h = 48.0

[[root.children.children]]
widget_type = "label"
id = "gold_label"
text = "Gold: 250"
x = 24.0
y = 16.0
w = 120.0
h = 24.0

[[root.children.children]]
widget_type = "label"
id = "lives_label"
text = "Lives: 20"
x = 160.0
y = 16.0
w = 104.0
h = 24.0

[[root.children.children]]
widget_type = "label"
id = "wave_label"
text = "Wave: 3 / 20"
x = 280.0
y = 16.0
w = 120.0
h = 24.0

[[root.children.children]]
widget_type = "progressbar"
id = "wave_progress"
x = 424.0
y = 16.0
w = 304.0
h = 24.0
min = 0.0
max = 20.0
value = 3.0
tooltip = "Wave progress"

[[root.children.children]]
widget_type = "button"
id = "speed_toggle"
text = "▶▶ 2×"
x = 760.0
y = 8.0
w = 80.0
h = 32.0
tooltip = "Toggle simulation speed"

[[root.children.children]]
widget_type = "button"
id = "pause_btn"
text = "⏸ Pause"
x = 848.0
y = 8.0
w = 88.0
h = 32.0

[[root.children.children]]
widget_type = "button"
id = "start_wave_btn"
text = "Send Wave →"
x = 1128.0
y = 8.0
w = 128.0
h = 32.0
tooltip = "Launch the next enemy wave early"

# ── Tower build panel (right sidebar) ────────────────────────────────────────

[[root.children]]
widget_type = "panel"
id = "build_panel"
x = 1064.0
y = 64.0
w = 224.0
h = 400.0

[[root.children.children]]
widget_type = "label"
text = "Build Tower"
x = 24.0
y = 8.0
w = 184.0
h = 24.0

[[root.children.children]]
widget_type = "button"
id = "build_archer"
text = "Archer Tower\n50g"
x = 8.0
y = 40.0
w = 200.0
h = 72.0
tooltip = "Archer Tower — fast single-target"

[[root.children.children]]
widget_type = "button"
id = "build_cannon"
text = "Cannon Tower\n100g"
x = 8.0
y = 120.0
w = 200.0
h = 72.0
tooltip = "Cannon Tower — area damage"

[[root.children.children]]
widget_type = "button"
id = "build_freeze"
text = "Frost Tower\n80g"
x = 8.0
y = 200.0
w = 200.0
h = 72.0
tooltip = "Frost Tower — slows enemies"

[[root.children.children]]
widget_type = "button"
id = "build_laser"
text = "Laser Tower\n150g"
x = 8.0
y = 280.0
w = 200.0
h = 72.0
tooltip = "Laser Tower — high DPS, expensive"

# ── Selected tower info ───────────────────────────────────────────────────────

[[root.children]]
widget_type = "panel"
id = "tower_info"
x = 1064.0
y = 472.0
w = 224.0
h = 200.0

[[root.children.children]]
widget_type = "label"
id = "tower_name"
text = "(select a tower)"
x = 8.0
y = 8.0
w = 200.0
h = 24.0

[[root.children.children]]
widget_type = "label"
id = "tower_stats"
text = ""
x = 8.0
y = 40.0
w = 200.0
h = 64.0

[[root.children.children]]
widget_type = "button"
id = "upgrade_btn"
text = "Upgrade (75g)"
x = 8.0
y = 112.0
w = 200.0
h = 40.0
enabled = false

[[root.children.children]]
widget_type = "button"
id = "sell_tower_btn"
text = "Sell (25g)"
x = 8.0
y = 152.0
w = 200.0
h = 40.0
enabled = false
