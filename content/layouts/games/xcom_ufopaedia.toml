# xcom_ufopaedia.toml — XCOM Ufopaedia / tech database screen
# Viewport: 1280 × 720
# Contains: category tree (left), entry list (centre-left),
#           article viewer (right — title / image / body / stats table)

[root]
widget_type = "panel"
id = "ufopaedia_root"
x = 0.0
y = 0.0
w = 1280.0
h = 720.0

[[root.children]]
widget_type = "panel"
id = "header_bar"
x = 0.0
y = 0.0
w = 1280.0
h = 48.0

[[root.children.children]]
widget_type = "label"
id = "screen_title"
x = 16.0
y = 16.0
w = 304.0
h = 24.0

[[root.children.children]]
widget_type = "textinput"
id = "search_bar"
x = 400.0
y = 8.0
w = 400.0
h = 32.0
placeholder = "Search Ufopaedia…"

[[root.children.children]]
widget_type = "button"
id = "back_btn"
x = 1200.0
y = 8.0
w = 72.0
h = 32.0

# Category tree
[[root.children]]
widget_type = "panel"
id = "category_panel"
x = 0.0
y = 48.0
w = 224.0
h = 672.0

[[root.children.children]]
widget_type = "treeview"
id = "category_tree"
x = 8.0
y = 8.0
w = 216.0
h = 664.0
tooltip = "Ufopaedia categories"

# Entry list
[[root.children]]
widget_type = "panel"
id = "entry_list_panel"
x = 224.0
y = 48.0
w = 280.0
h = 672.0

[[root.children.children]]
widget_type = "label"
id = "category_heading"
x = 8.0
y = 8.0
w = 264.0
h = 24.0

[[root.children.children]]
widget_type = "scrollpanel"
id = "entry_list"
x = 8.0
y = 32.0
w = 272.0
h = 632.0
tooltip = "Articles in this category"

# Article viewer
[[root.children]]
widget_type = "panel"
id = "article_viewer"
x = 504.0
y = 48.0
w = 784.0
h = 672.0

[[root.children.children]]
widget_type = "label"
id = "article_title"
x = 16.0
y = 16.0
w = 760.0
h = 32.0

[[root.children.children]]
widget_type = "panel"
id = "article_image"
x = 16.0
y = 48.0
w = 264.0
h = 200.0
