widget_type = "button"
id = "del_2"
text = "✕"
x = 400.0
y = 248.0
w = 32.0
h = 24.0
tooltip = "Delete task"

[[root.children]]
widget_type = "checkbox"
id = "task_3"
text = "Update documentation"
x = 24.0
y = 288.0
