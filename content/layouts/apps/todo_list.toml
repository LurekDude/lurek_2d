y = 208.0
w = 344.0
h = 32.0
checked = false

[[root.children]]
widget_type = "button"
id = "del_1"
text = "✕"
x = 400.0
y = 216.0
w = 32.0
h = 24.0
tooltip = "Delete task"

[[root.children]]
