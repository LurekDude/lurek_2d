# todo_list.toml — Task / to-do list app
# Viewport: 440 × 640
# Contains: title, new-task input + add button, filter tabs (All/Active/Done),
#           5 task items with checkboxes, progress bar, clear-completed button

[root]
widget_type = "panel"
id          = "todo_root"
x = 0.0
y = 0.0
w = 440.0
h = 640.0

# ── Header ────────────────────────────────────────────────────────────────────

[[root.children]]
widget_type = "label"
id = "todo_title"
text = "My Tasks"
x = 24.0
y = 24.0
w = 280.0
h = 40.0

[[root.children]]
widget_type = "badge"
id = "active_count"
x = 312.0
y = 24.0
w = 48.0
h = 40.0
tooltip = "Active task count"

[[root.children]]
widget_type = "label"
id = "active_label"
text = "tasks left"
x = 368.0
y = 32.0
w = 64.0
h = 24.0

# ── New task input ────────────────────────────────────────────────────────────

[[root.children]]
widget_type = "textinput"
id = "new_task_input"
x = 24.0
y = 72.0
w = 320.0
h = 40.0
placeholder = "What needs to be done?"

[[root.children]]
widget_type = "button"
id = "add_task_btn"
text = "Add"
x = 352.0
y = 72.0
w = 72.0
h = 40.0
tooltip = "Add new task"

# ── Filter tabs ───────────────────────────────────────────────────────────────

[[root.children]]
widget_type = "button"
id = "filter_all"
text = "All"
x = 24.0
y = 120.0
w = 120.0
h = 32.0

[[root.children]]
widget_type = "button"
id = "filter_active"
text = "Active"
x = 152.0
y = 120.0
w = 120.0
h = 32.0

[[root.children]]
widget_type = "button"
id = "filter_done"
text = "Done"
x = 280.0
y = 120.0
w = 120.0
h = 32.0

[[root.children]]
widget_type = "checkbox"
id = "task_0"
text = "Set up project structure"
x = 24.0
y = 176.0
w = 344.0
h = 32.0
checked = true

[[root.children]]
widget_type = "button"
id = "del_0"
text = "✕"
x = 400.0
y = 176.0
w = 32.0
h = 24.0
tooltip = "Delete task"

[[root.children]]
widget_type = "checkbox"
id = "task_1"
text = "Write unit tests"
