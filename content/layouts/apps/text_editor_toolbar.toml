# text_editor_toolbar.toml — Text / code editor toolbar layout
# Viewport: 1280 × 720
# Contains: menu bar (File/Edit/View/Format/Tools/Help), format toolbar
#           (bold/italic/underline/strikethrough, font combobox, size spinbox,
#           align buttons, colour button), bottom status bar

[root]
widget_type = "panel"
id          = "editor_root"
x = 0.0
y = 0.0
w = 1280.0
h = 720.0

# ── Menu bar ──────────────────────────────────────────────────────────────────

[[root.children]]
widget_type = "panel"
id = "menu_bar"
x = 0.0
y = 0.0
w = 1280.0
h = 32.0

[[root.children.children]]
widget_type = "button"
id = "menu_file"
text = "File"
x = 8.0
y = 0.0
w = 48.0
h = 24.0

[[root.children.children]]
widget_type = "button"
id = "menu_edit"
text = "Edit"
x = 56.0
y = 0.0
w = 48.0
h = 24.0

[[root.children.children]]
widget_type = "button"
id = "menu_view"
text = "View"
x = 112.0
y = 0.0
w = 48.0
h = 24.0

[[root.children.children]]
widget_type = "button"
id = "menu_format"
text = "Format"
x = 168.0
y = 0.0
w = 64.0
h = 24.0

[[root.children.children]]
widget_type = "button"
id = "menu_tools"
text = "Tools"
x = 232.0
y = 0.0
w = 56.0
h = 24.0

[[root.children.children]]
widget_type = "button"
id = "menu_help"
text = "Help"
x = 296.0
y = 0.0
w = 48.0
h = 24.0

# ── Quick actions (right of menu bar) ────────────────────────────────────────

[[root.children.children]]
widget_type = "button"
id = "new_btn"
text = "New"
x = 1000.0
y = 0.0
w = 48.0
h = 24.0
tooltip = "New file (Ctrl+N)"

[[root.children.children]]
widget_type = "button"
id = "open_btn"
text = "Open"
x = 1056.0
y = 0.0
w = 56.0
h = 24.0
tooltip = "Open file (Ctrl+O)"

[[root.children.children]]
widget_type = "button"
id = "save_btn"
text = "Save"
x = 1112.0
y = 0.0
w = 56.0
h = 24.0
tooltip = "Save (Ctrl+S)"

[[root.children.children]]
widget_type = "button"
id = "saveas_btn"
text = "Save As"
x = 1176.0
y = 0.0
w = 80.0
h = 24.0
tooltip = "Save As (Ctrl+Shift+S)"

# ── Format toolbar ────────────────────────────────────────────────────────────

[[root.children]]
widget_type = "panel"
id = "format_toolbar"
x = 0.0
y = 32.0
w = 1280.0
h = 40.0

# Font family & size

[[root.children.children]]
widget_type = "combobox"
