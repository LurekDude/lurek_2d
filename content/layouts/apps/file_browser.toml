# file_browser.toml — Filesystem browser UI
# Viewport: 1000 × 700
# Contains: toolbar (nav buttons, path bar, search), file/folder list panel,
#           status bar with item count and selection info

[root]
widget_type = "panel"
id          = "file_browser_root"
x = 0.0
y = 0.0
w = 1000.0
h = 704.0

# ── Toolbar ───────────────────────────────────────────────────────────────────

[[root.children]]
widget_type = "panel"
id = "toolbar"
x = 0.0
y = 0.0
w = 1000.0
h = 48.0

[[root.children.children]]
widget_type = "button"
id = "nav_back"
text = "←"
x = 8.0
y = 8.0
w = 40.0
h = 32.0
tooltip = "Back"

[[root.children.children]]
widget_type = "button"
id = "nav_forward"
text = "→"
x = 48.0
y = 8.0
w = 40.0
h = 32.0
tooltip = "Forward"

[[root.children.children]]
widget_type = "button"
id = "nav_up"
text = "↑"
x = 96.0
y = 8.0
w = 40.0
h = 32.0
tooltip = "Up one level"

[[root.children.children]]
widget_type = "button"
id = "nav_home"
text = "⌂"
x = 136.0
y = 8.0
w = 40.0
h = 32.0
tooltip = "Go to Home"

[[root.children.children]]
widget_type = "textinput"
id = "path_bar"
x = 176.0
y = 8.0
w = 520.0
h = 32.0
text = "/home/user/Documents"
tooltip = "Current path — edit to navigate"

[[root.children.children]]
widget_type = "button"
id = "path_go"
text = "Go"
x = 704.0
y = 8.0
w = 40.0
h = 32.0

[[root.children.children]]
widget_type = "textinput"
id = "search_bar"
x = 752.0
y = 8.0
w = 200.0
h = 32.0
placeholder = "Search files…"

[[root.children.children]]
widget_type = "button"
id = "search_btn"
text = "🔍"
x = 960.0
y = 8.0
w = 32.0
h = 32.0
tooltip = "Run search"

