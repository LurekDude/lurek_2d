<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650">
    <style>
        .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #333; }
        .box { fill: #f8f9fa; stroke: #333; stroke-width: 2; rx: 8; }
        .box-game { fill: #ffebee; stroke: #dc3545; stroke-width: 2; rx: 8; }
        .box-luna { fill: #e3f2fd; stroke: #0d6efd; stroke-width: 2; rx: 8; }
        .box-sim { fill: #e8f5e9; stroke: #198754; stroke-width: 2; rx: 8; }
        .box-tier1 { fill: #fff3cd; stroke: #ffc107; stroke-width: 2; rx: 8; }
        .box-ui { fill: #f3e5f5; stroke: #6f42c1; stroke-width: 2; rx: 8; }
        .box-wrapper { fill: #e0f7fa; stroke: #00acc1; stroke-width: 2; rx: 8; }
        .text { font-family: sans-serif; font-size: 17px; font-weight: bold; fill: #333; text-anchor: middle; }
        .text-small { font-family: sans-serif; font-size: 13px; fill: #555; text-anchor: middle; }
        .arrow { stroke: #666; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
        </marker>
    </defs>

    <text x="500" y="40" class="title" text-anchor="middle">Luna2D Architecture: Game Engine vs. Business Simulation</text>

    <!-- LEFT SIDE: GAME ENGINE -->
    <text x="250" y="80" class="title" text-anchor="middle">Luna2D Game Engine</text>

    <rect x="100" y="110" width="300" height="70" class="box-game" />
    <text x="250" y="140" class="text">The Game Itself (Lua)</text>
    <text x="250" y="160" class="text-small">Game Scripts, Logic &amp; Configuration</text>

    <path d="M 250 180 L 250 210" class="arrow" />

    <rect x="100" y="210" width="300" height="70" class="box-luna" />
    <text x="250" y="240" class="text">Tier 3: Lunasome</text>
    <text x="250" y="260" class="text-small">Pure Lua Libraries (Gameplay)</text>

    <path d="M 250 280 L 250 310" class="arrow" />

    <rect x="100" y="310" width="300" height="70" class="box-luna" />
    <text x="250" y="340" class="text">Tier 2: Extended Modules</text>
    <text x="250" y="360" class="text-small">Rust Libraries (AI, Tilemaps, Pathfinding)</text>

    <path d="M 250 380 L 350 420" class="arrow" />

    <!-- RIGHT SIDE: BUSINESS SIMULATION -->
    <text x="750" y="80" class="title" text-anchor="middle">Business Simulation App</text>

    <rect x="560" y="110" width="120" height="70" class="box-ui" />
    <text x="620" y="140" class="text">VS Code</text>
    <text x="620" y="160" class="text-small">Extension</text>

    <rect x="690" y="110" width="120" height="70" class="box-ui" />
    <text x="750" y="140" class="text">Playbooks</text>
    <text x="750" y="160" class="text-small">Configuration</text>

    <rect x="820" y="110" width="120" height="70" class="box-ui" />
    <text x="880" y="140" class="text">Custom CAG</text>
    <text x="880" y="160" class="text-small">AI Agents</text>

    <path d="M 620 180 L 730 210" class="arrow" />
    <path d="M 750 180 L 750 210" class="arrow" />
    <path d="M 880 180 L 770 210" class="arrow" />

    <rect x="600" y="210" width="300" height="70" class="box-wrapper" />
    <text x="750" y="240" class="text">Python/TS Interface</text>
    <text x="750" y="260" class="text-small">Simulation Frontend UI</text>

    <path d="M 750 280 L 750 310" class="arrow" />

    <rect x="600" y="310" width="300" height="70" class="box-sim" />
    <text x="750" y="340" class="text">Business Simulation Lib</text>
    <text x="750" y="360" class="text-small">Heavy Compute &amp; Graph (GPU-Accelerated)</text>

    <path d="M 750 380 L 650 420" class="arrow" />

    <!-- BOTTOM: SHARED -->
    <rect x="250" y="420" width="500" height="90" class="box-tier1" />
    <text x="500" y="455" class="text">Tier 1: Baseline (Core Engine)</text>
    <text x="500" y="475" class="text-small">wgpu Renderer, Threading, OS Abstracts</text>
    <text x="500" y="495" class="text-small">Compiled as Executable (Left) OR DLL/Library (Right)</text>

    <!-- LEGEND -->
    <rect x="50" y="540" width="900" height="80" class="box" />
    <text x="80" y="565" class="text-small" text-anchor="start" style="font-weight: bold;">Legend:</text>

    <rect x="80" y="580" width="20" height="20" class="box-game" />
    <text x="110" y="595" class="text-small" text-anchor="start">Top Level Logic</text>

    <rect x="240" y="580" width="20" height="20" class="box-luna" />
    <text x="270" y="595" class="text-small" text-anchor="start">Luna2D Engine Layers</text>

    <rect x="440" y="580" width="20" height="20" class="box-ui" />
    <text x="470" y="595" class="text-small" text-anchor="start">Ext &amp; AI Tooling</text>

    <rect x="600" y="580" width="20" height="20" class="box-sim" />
    <text x="630" y="595" class="text-small" text-anchor="start">Simulation Library</text>

    <rect x="780" y="580" width="20" height="20" class="box-tier1" />
    <text x="810" y="595" class="text-small" text-anchor="start">Shared Baseline DLL</text>

</svg>
