# <screen_name>.toml — <one-line description>
# Viewport: 1280 × 720
# Contains: <bullet list of major regions>

[root]
widget_type = "panel"
id          = "<screen>_root"
x = 0.0
y = 0.0
w = 1280.0
h = 720.0

# ── Section name ──────────────────────────────────────────────────────────────

[[root.children]]
widget_type = "panel"
id = "<section>_panel"
x = 0.0
y = 0.0
w = 1280.0
h = 48.0

[[root.children.children]]
widget_type = "label"
id = "screen_title"
x = 16.0
y = 12.0
w = 400.0
h = 24.0
